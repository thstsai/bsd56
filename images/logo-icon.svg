<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!-- Outer window frame -->
  <rect x="2" y="2" width="56" height="56" rx="8" ry="8" fill="#1a3a6c"/>
  <!-- Title bar -->
  <rect x="2" y="2" width="56" height="16" rx="8" ry="8" fill="#0f2348"/>
  <rect x="2" y="10" width="56" height="8" fill="#0f2348"/>
  <!-- Traffic-light dots -->
  <circle cx="13" cy="10" r="3.5" fill="#8e44ad"/>
  <circle cx="23" cy="10" r="3.5" fill="#2980b9"/>
  <circle cx="33" cy="10" r="3.5" fill="#27ae60"/>
  <!-- Code area -->
  <rect x="2" y="18" width="56" height="40" rx="0" fill="#0d1b2e"/>
  <path d="M2 48 h56 v6 q0 6 -8 6 h-40 q-8 0 -8 -6 z" fill="#0d1b2e"/>
  <!-- Prompt arrow -->
  <text x="7" y="34" font-family="'Courier New',monospace" font-size="9" font-weight="bold" fill="#27ae60">▶</text>
  <!-- BSD text -->
  <text x="18" y="34" font-family="'Courier New',monospace" font-size="9" fill="#ffffff">BSD</text>
  <!-- 56 in orange -->
  <text x="41" y="34" font-family="'Courier New',monospace" font-size="9" font-weight="bold" fill="#e67e22">56</text>
  <!-- Fake code lines -->
  <line x1="7" y1="42" x2="46" y2="42" stroke="#1e4080" stroke-width="1.2"/>
  <line x1="7" y1="48" x2="38" y2="48" stroke="#1e4080" stroke-width="1.2"/>
  <line x1="7" y1="54" x2="30" y2="54" stroke="#1e4080" stroke-width="1.2"/>
</svg>
